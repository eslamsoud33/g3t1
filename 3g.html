<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكنز - اختبار الجغرافيا</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .font-cairo { font-family: 'Cairo', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // --- Data ---
        const questions = [
            { "id": 1, "question": "تتشابه قارة «أفريقيا» وقارة «أستراليا» في المظهر التضاريسي العام، حيث يسود كليهما المظهر:", "options": ["الجبلي", "الهضبي", "السهلي", "الجليدي"], "correct": 1, "rationale": "يسود المظهر الهضبي سطح القارتين، حيث تشغل الهضاب مساحات واسعة في أفريقيا وتشغل الهضبة الغربية نصف مساحة أستراليا." },
            { "id": 2, "question": "أي من الظواهر الجغرافية الآتية تُعد «حدًا فاصلاً» طبيعياً بين قارة آسيا وقارة أوروبا؟", "options": ["جبال الهيمالايا", "جبال الأورال", "هضبة التبت", "بحر قزوين"], "correct": 1, "rationale": "تفصل جبال الأورال قارة آسيا عن قارة أوروبا جغرافيًا." },
            { "id": 3, "question": "أعلى قمة جبلية في العالم تقع ضمن سلاسل جبال «الهيمالايا» وتعرف باسم:", "options": ["كيليمانجارو", "إفرست", "مونت بلان", "أكونكاجوا"], "correct": 1, "rationale": "قمة إفرست هي أعلى قمة جبلية في العالم بارتفاع يزيد عن 8848 مترًا." },
            { "id": 4, "question": "كل الأنهار الآتية تصب في «المحيط الأطلنطي» ما عدا:", "options": ["نهر الأمازون", "نهر الكونغو", "نهر الفولجا", "نهر النيجر"], "correct": 2, "rationale": "نهر الفولجا يصب في بحر قزوين (وهو أكبر بحر مغلق)، مما يجعله الاستثناء." },
            { "id": 5, "question": "تنمو «الغابات النفضية» في إقليم مناخ غرب أوروبا، وسميت بذلك لأنها:", "options": ["تنمو بسرعة صيفاً", "تنفض أوراقها شتاءً", "تحتفظ بأوراقها", "تتحمل الجفاف"], "correct": 1, "rationale": "تتميز الغابات النفضية بنفض أوراقها في فصل الشتاء بسبب انخفاض درجات الحرارة الشديد." },
            { "id": 6, "question": "يتركز السكان في «السهول الفيضية» مثل سهول نهر اليانجتسي في الصين بسبب:", "options": ["وفرة الغابات", "اعتدال المناخ صيفاً", "خصوبة التربة والمياه", "المناطق الجبلية"], "correct": 2, "rationale": "تعد السهول الفيضية مناطق جذب سكاني لتوفر مقومات الزراعة من تربة خصبة ومياه." },
            { "id": 7, "question": "أي من الأقاليم المناخية التالية يتميز بسقوط الأمطار «طوال العام»؟", "options": ["الاستوائي وشبه الاستوائي", "المداري الحار", "الموسمي", "البحر المتوسط"], "correct": 0, "rationale": "يتميز الإقليم الاستوائي بارتفاع الحرارة وسقوط الأمطار طوال العام." },
            { "id": 8, "question": "السلالة البشرية التي تتميز بـ «الشعر الأسود المسترسل» والعيون المنحرفة هي:", "options": ["القوقازية", "الزنجية", "المغولية", "النوردية"], "correct": 2, "rationale": "تتميز السلالة المغولية بالبشرة الصفراء، العيون المنحرفة، والشعر الأسود المسترسل." },
            { "id": 9, "question": "يصب نهر «الدانوب» في قارة أوروبا في:", "options": ["بحر الشمال", "البحر الأسود", "بحر قزوين", "المحيط الأطلنطي"], "correct": 1, "rationale": "يصب نهر الدانوب، وهو من أهم أنهار أوروبا، في البحر الأسود." },
            { "id": 10, "question": "«علم دراسة السكان» الذي يهتم بنمو وتوزيع وتركيب السكان يُعرف بمصطلح:", "options": ["الجغرافيا الإقليمية", "الديموجرافيا", "الإثنوجرافيا", "التضاريس"], "correct": 1, "rationale": "الديموجرافيا هو المصطلح العلمي لعلم دراسة السكان." },
            { "id": 11, "question": "القارة التي تسجل «أعلى معدل مواليد» في العالم هي:", "options": ["أوروبا", "آسيا", "أفريقيا", "أستراليا"], "correct": 2, "rationale": "تسجل أفريقيا أعلى معدلات المواليد عالميًا نتيجة عوامل اقتصادية واجتماعية." },
            { "id": 12, "question": "بحر «المانش» يفصل بين جزر بريطانيا والقارة الأوروبية، ويدل ذلك على كثرة .......... في سواحل أوروبا.", "options": ["الاستقامة", "التعرج", "التجمد", "الرمال"], "correct": 1, "rationale": "تتميز سواحل أوروبا بالتعرج وكثرة الجزر، مما ساعد على إنشاء الموانئ الطبيعية." },
            { "id": 13, "question": "يقل السكان في هذه المنطقة لسيادة «الظروف الصحراوية»:", "options": ["غرب أوروبا", "غرب أستراليا", "شرق آسيا", "شمال أمريكا"], "correct": 1, "rationale": "يقل السكان في غرب وداخل أستراليا لسيادة الظروف الصحراوية (الصحراء الرملية الكبرى)." },
            { "id": 14, "question": "«الناتج الفرق بين معدلات المواليد ومعدلات الوفيات» هو تعريف لمصطلح:", "options": ["قوة العمل", "التركيب العمري", "الزيادة الطبيعية", "الكثافة السكانية"], "correct": 2, "rationale": "الزيادة الطبيعية تُحسب بطرح معدل الوفيات من معدل المواليد." },
            { "id": 15, "question": "أصغر هضاب قارة أمريكا الجنوبية مساحة وتقع في الجنوب هي هضبة:", "options": ["جيانا", "البرازيل", "بتاجونيا", "التبت"], "correct": 2, "rationale": "بتاجونيا هي أصغر هضاب أمريكا الجنوبية مساحة وتقع في أقصى الجنوب." },
            { "id": 16, "question": "ينتمي «العرب» ومعظم سكان جنوب أوروبا إلى السلالة:", "options": ["المغولية", "القوقازية", "الزنجية", "النوردية"], "correct": 1, "rationale": "ينتمي العرب وسكان حوض البحر المتوسط إلى السلالة القوقازية." },
            { "id": 17, "question": "أكبر بحر «مغلق» في العالم يقع في قارة آسيا هو:", "options": ["البحر المتوسط", "البحر الأحمر", "بحر قزوين", "بحر اليابان"], "correct": 2, "rationale": "بحر قزوين هو أكبر بحر مغلق في العالم ولا يتصل ببحار أخرى." },
            { "id": 18, "question": "من الأشجار التي تنمو في الغابات المخروطية (التايجا):", "options": ["الماهوجني", "الزيتون", "الصنوبر", "المطاط"], "correct": 2, "rationale": "أشجار الصنوبر والشربين هي الأشجار المميزة للغابات المخروطية." },
            { "id": 19, "question": "ترتفع نسبة كبار السن في الدول المتقدمة بسبب:", "options": ["الزواج المبكر", "التقدم الصحي", "الحروب", "الهجرة"], "correct": 1, "rationale": "تحسن الرعاية الصحية يؤدي إلى طول العمر وانخفاض الوفيات، مما يزيد نسبة كبار السن." },
            { "id": 20, "question": "يقل السكان في «سهول الأمازون» بأمريكا الجنوبية بسبب:", "options": ["برودة الجو", "ندرة المياه", "الغابات الاستوائية", "وعورة السطح"], "correct": 2, "rationale": "يقل السكان في سهول الأمازون بسبب الغابات الكثيفة والظروف الطبيعية القاسية." },
            { "id": 21, "question": "الدول ذات «الدخل الاقتصادي المنخفض» يعتمد سكانها بشكل أساسي على:", "options": ["الصناعة", "الزراعة", "التعدين", "السياحة"], "correct": 1, "rationale": "النشاط الزراعي هو النشاط السائد في الدول ذات الدخل الاقتصادي المنخفض."
            },
            { "id": 22, "question": "«أوسع سهول فيضية في العالم» (سهول الأمازون) تقع في قارة:", "options": ["أفريقيا", "أمريكا الشمالية", "أمريكا الجنوبية", "آسيا"], "correct": 2, "rationale": "سهول نهر الأمازون في أمريكا الجنوبية هي الأوسع في العالم." },
            { "id": 23, "question": "من الدول «الجزرية» التي تقع في قارة آسيا:", "options": ["مدغشقر", "اليابان", "أيسلندا", "تسمانيا"], "correct": 1, "rationale": "تعد اليابان والفلبين من أهم الدول الجزرية التابعة لقارة آسيا." },
            { "id": 24, "question": "العامل المشترك بين إقليم «المناخ المداري» وإقليم «المناخ الموسمي» هو:", "options": ["أمطار شتوية", "أمطار صيفية", "غابات مخروطية", "حرارة معتدلة"], "correct": 1, "rationale": "يتشابه الإقليمان في سقوط الأمطار خلال فصل الصيف والجفاف شتاءً." },
            { "id": 25, "question": "تعرف حشائش الاستبس في قارة أمريكا الشمالية باسم:", "options": ["السافانا", "البراري", "التندرا", "النفضية"], "correct": 1, "rationale": "يطلق على حشائش الاستبس في أمريكا الشمالية اسم البراري." },
            { "id": 26, "question": "دولة ذات «رعاية طبية منخفضة» وتقع في قارة أفريقيا:", "options": ["مصر", "روسيا", "النيجر", "الإمارات"], "correct": 2, "rationale": "تصنف النيجر وإثيوبيا ضمن الدول ذات الرعاية الطبية المنخفضة." },
            { "id": 27, "question": "أي من الآتي يُعد مثالاً للسلالة النقية في الوقت الحاضر؟", "options": ["الأمريكيون", "الإسكيمو", "العرب", "الأوروبيون"], "correct": 1, "rationale": "يعد الإسكيمو في صحاري التندرا من الأمثلة القليلة المتبقية للسلالات النقية." },
            { "id": 28, "question": "يصب نهر «المسيسبي» في قارة أمريكا الشمالية في:", "options": ["خليج هدسن", "المحيط الهادي", "خليج المكسيك", "سانت لورانس"], "correct": 2, "rationale": "يصب نهر المسيسبي في خليج المكسيك، وتعتبر سهوله مناطق زراعية خصبة." },
            { "id": 29, "question": "«ارتفاع معدل المواليد وانخفاض معدل الوفيات» يؤدي إلى:", "options": ["ثبات السكان", "ارتفاع الزيادة الطبيعية", "انخفاض الزيادة", "زيادة الوفيات"], "correct": 1, "rationale": "الفرق الإيجابي الكبير بين المواليد والوفيات يعني ارتفاع الزيادة الطبيعية." },
            { "id": 30, "question": "أي الدول الآتية تعتمد على الزراعة ولها دخل اقتصادي منخفض؟", "options": ["غرب أوروبا", "الولايات المتحدة", "الخليج العربي", "الكونغو"], "correct": 3, "rationale": "الكونغو من الدول ذات الدخل المنخفض التي تعتمد على الزراعة." },
            { "id": 31, "question": "أكبر هضاب قارة آسيا وتعرف بـ «سقف العالم»:", "options": ["الدكن", "التبت", "شبه الجزيرة", "الأناضول"], "correct": 1, "rationale": "تسمى هضبة التبت بسقف العالم لارتفاعها عن قمم الجبال." },
            { "id": 32, "question": "يعيش حيوان «الرنة» في إقليم مناخ:", "options": ["البحر المتوسط", "الصيني", "التندرا", "الموسمي"], "correct": 2, "rationale": "حيوان الرنة يتكيف مع البرودة الشديدة في إقليم التندرا." },
            { "id": 33, "question": "أكبر دولة في أمريكا الجنوبية سكاناً ومساحة هي:", "options": ["الأرجنتين", "البرازيل", "شيلي", "فنزويلا"], "correct": 1, "rationale": "تعد البرازيل أكبر دول أمريكا الجنوبية سكاناً وتمثل نصف سكان القارة." },
            { "id": 34, "question": "يقل السكان في شمال آسيا (سهول سيبيريا) بسبب:", "options": ["برودة الجو", "الجفاف", "الجبال", "الغابات"], "correct": 0, "rationale": "سهول سيبيريا الشمالية يقل بها السكان لشدة البرودة وقربها من القطب الشمالي." },
            { "id": 35, "question": "قارة سجلت معدل وفيات مرتفع (11 في الألف) لزيادة كبار السن:", "options": ["أفريقيا", "آسيا", "أوروبا", "أمريكا الجنوبية"], "correct": 2, "rationale": "رغم تقدمها الصحي، ترتفع الوفيات في أوروبا لزيادة نسبة الشيوخ." },
            { "id": 36, "question": "يفصل قارة «أستراليا» عن جزر إندونيسيا بحر:", "options": ["المرجان", "أرافورا", "تيمور", "الشمال"], "correct": 1, "rationale": "بحر أرافورا يقع شمال أستراليا ويفصلها عن إندونيسيا." },
            { "id": 37, "question": "فئة عمرية غير منتجة وتكلف الدولة ميزانية ضخمة للتعليم والصحة:", "options": ["كبار السن", "صغار السن", "قوة العمل", "الشباب"], "correct": 1, "rationale": "فئة صغار السن تتطلب إنفاقاً كبيراً على الخدمات الأساسية وهي فئة غير منتجة." },
            { "id": 38, "question": "يتركز سكان كندا في المدن الكبرى مثل مدينة:", "options": ["نيويورك", "مكسيكو", "مونتريال", "واشنطن"], "correct": 2, "rationale": "مدينة مونتريال من أهم المدن ومناطق التركز السكاني في كندا." },
            { "id": 39, "question": "سلسلة جبلية تمتد في غرب أمريكا الشمالية:", "options": ["الأبلاش", "روكي", "الإنديز", "الألب"], "correct": 1, "rationale": "جبال روكي هي السلسلة الجبلية الرئيسية والمرتفعة في غرب أمريكا الشمالية." },
            { "id": 40, "question": "النشاط الاقتصادي السائد في الدول ذات الدخل المرتفع هو:", "options": ["الزراعة", "الرعي", "الصناعة", "الصيد"], "correct": 2, "rationale": "تعتمد الدول ذات الدخل المرتفع بشكل أساسي على الصناعة والخدمات." }
        ];

        // --- Header Component ---
        const Header = ({ setPage, studentName }) => {
            const [isFullscreen, setIsFullscreen] = useState(false);

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().then(() => setIsFullscreen(true)).catch(err => console.error(err));
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen().then(() => setIsFullscreen(false));
                    }
                }
            };

            return (
                <header className="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
                    <div className="container mx-auto flex justify-between items-center">
                        <div className="flex items-center space-x-2 space-x-reverse cursor-pointer" onClick={() => setPage('home')}>
                            <Icon name="globe" className="h-8 w-8" />
                            <div className="flex flex-col">
                                <h1 className="text-xl font-bold">الكنز</h1>
                                <p className="text-xl text-yellow-300 font-cairo font-bold mt-1">إعداد: أ/ إسلام سعود</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {studentName && (
                                <div className="hidden md:flex items-center gap-2 bg-indigo-800 px-3 py-1 rounded-full text-sm">
                                    <Icon name="user" className="h-4 w-4" />
                                    <span>{studentName}</span>
                                </div>
                            )}
                            <button 
                                onClick={toggleFullScreen}
                                className="flex items-center gap-1 bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg text-sm transition"
                                title={isFullscreen ? "إنهاء ملء الشاشة" : "ملء الشاشة"}
                            >
                                {isFullscreen ? <Icon name="minimize" className="h-4 w-4" /> : <Icon name="maximize" className="h-4 w-4" />}
                                <span className="hidden sm:inline">{isFullscreen ? "تصغير" : "ملء الشاشة"}</span>
                            </button>
                        </div>
                    </div>
                </header>
            );
        };

        // --- HomePage Component ---
        const HomePage = ({ setPage, studentName, setStudentName }) => (
            <div className="flex flex-col items-center justify-center min-h-[80vh] bg-gradient-to-b from-indigo-50 to-white text-center p-6 fade-in">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border-t-4 border-indigo-600">
                    <div className="flex justify-center mb-6">
                        <div className="bg-indigo-100 p-4 rounded-full">
                            <Icon name="book-open" className="h-16 w-16 text-indigo-600" />
                        </div>
                    </div>
                    <h2 className="text-3xl font-bold text-gray-800 mb-3">مرحباً بك في اختبار الجغرافيا</h2>
                    
                    <div className="mb-6 inline-block bg-indigo-50 px-6 py-2 rounded-full border border-indigo-100">
                        <span className="text-indigo-800 font-cairo font-bold text-2xl">إعداد: أ/ إسلام سعود</span>
                    </div>

                    <p className="text-gray-600 mb-8 text-lg leading-relaxed">
                        سجل اسمك في الأسفل للبدء في الاختبار الشامل لمنهج الجغرافيا.
                    </p>
                    
                    <div className="space-y-4 mb-8 text-right w-full">
                        <div>
                            <label className="block text-gray-700 font-bold mb-2 mr-1 flex items-center gap-2">
                                <Icon name="user" className="h-4 w-4 text-indigo-500" /> اسم الطالب رباعي:
                            </label>
                            <input 
                            type="text" 
                            value={studentName}
                            onChange={(e) => setStudentName(e.target.value)}
                            placeholder="اكتب اسمك رباعياً هنا..."
                            className="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-right"
                            />
                        </div>
                    </div>

                    <button 
                        onClick={() => setPage('quiz')}
                        disabled={!studentName.trim()}
                        className={`w-full text-white py-4 rounded-xl text-xl font-bold shadow-lg transition transform flex items-center justify-center gap-2 ${!studentName.trim() ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:scale-105'}`}
                    >
                        <Icon name="play-circle" className="h-6 w-6" />
                        {studentName.trim() ? 'ابدأ الاختبار الآن' : 'أدخل اسمك لتبدأ'}
                    </button>
                </div>
            </div>
        );

        // --- QuizPage Component ---
        const QuizPage = ({ setPage, score, setScore, setQuizFinished, setUserAnswers }) => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [localAnswers, setLocalAnswers] = useState([]);

            const currentQ = questions[currentQIndex];

            const handleOptionClick = (index) => {
                setSelectedOption(index);
            };

            const handleNextClick = () => {
                const isCorrect = selectedOption === currentQ.correct;
                
                const newAnswer = {
                    questionId: currentQ.id,
                    questionText: currentQ.question,
                    options: currentQ.options,
                    selectedOption: selectedOption,
                    correctOption: currentQ.correct,
                    rationale: currentQ.rationale,
                    isCorrect: isCorrect
                };

                const updatedAnswers = [...localAnswers, newAnswer];
                setLocalAnswers(updatedAnswers);

                if (isCorrect) {
                    setScore(s => s + 1);
                }

                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                    setSelectedOption(null);
                } else {
                    setUserAnswers(updatedAnswers);
                    setQuizFinished(true);
                    setPage('result');
                }
            };

            const progress = ((currentQIndex) / questions.length) * 100;

            return (
                <div className="container mx-auto p-4 max-w-3xl flex flex-col items-center min-h-[85vh] fade-in">
                    <div className="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                        <div className="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                    </div>

                    <div className="w-full flex justify-between text-sm text-gray-500 mb-2">
                        <span>السؤال {currentQIndex + 1} من {questions.length}</span>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl w-full overflow-hidden border border-gray-100">
                        <div className="p-6 md:p-8">
                            <h2 className="text-xl md:text-2xl font-bold text-gray-800 leading-relaxed mb-6">
                                {currentQ.question}
                            </h2>

                            <div className="space-y-3">
                                {currentQ.options.map((option, index) => {
                                    let btnClass = "w-full p-4 text-right rounded-xl border-2 transition-all duration-200 flex items-center justify-between group ";
                                    
                                    if (selectedOption === index) {
                                        btnClass += "bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm font-bold";
                                    } else {
                                        btnClass += "bg-white border-gray-200 hover:border-indigo-300 hover:bg-gray-50 text-gray-700";
                                    }

                                    return (
                                        <button
                                            key={index}
                                            onClick={() => handleOptionClick(index)}
                                            className={btnClass}
                                        >
                                            <span className="flex items-center gap-3">
                                                <span className={`w-8 h-8 flex items-center justify-center rounded-full text-sm ${selectedOption === index ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                                                    {['أ', 'ب', 'ج', 'د'][index]}
                                                </span>
                                                {option}
                                            </span>
                                            {selectedOption === index && <div className="w-4 h-4 rounded-full bg-indigo-600"></div>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="bg-gray-50 p-4 flex justify-end">
                            <button
                                onClick={handleNextClick}
                                disabled={selectedOption === null}
                                className={`px-8 py-3 rounded-xl font-bold text-white transition transform flex items-center gap-2 ${selectedOption === null ? 'bg-gray-300 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:scale-105 shadow-md'}`}
                            >
                                {currentQIndex < questions.length - 1 ? 'السؤال التالي' : 'إنهاء'}
                                <Icon name="arrow-left" className="h-5 w-5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- ResultPage Component ---
        const ResultPage = ({ score, total, userAnswers, setPage, resetQuiz, studentName }) => {
            const percentage = Math.round((score / total) * 100);
            let message = "";
            let colorClass = "";
            let IconComp = "trophy";

            if (percentage >= 90) {
                message = "ممتاز! أنت عبقري في الجغرافيا.";
                IconComp = "trophy";
                colorClass = "text-yellow-600";
            } else if (percentage >= 75) {
                message = "جيد جداً! مستوى رائع.";
                IconComp = "check-circle";
                colorClass = "text-green-600";
            } else if (percentage >= 50) {
                message = "جيد، ولكن تحتاج للمزيد من المراجعة.";
                IconComp = "book-open";
                colorClass = "text-blue-600";
            } else {
                message = "حاول مرة أخرى، لا تيأس!";
                IconComp = "refresh-ccw";
                colorClass = "text-red-600";
            }

            return (
                <div className="container mx-auto p-4 max-w-4xl min-h-[80vh] fade-in">
                    <div className="bg-white p-8 rounded-3xl shadow-xl mb-8 text-center border-t-8 border-indigo-600">
                        <div className="mb-4 inline-block bg-indigo-50 px-4 py-1 rounded-full text-indigo-800 font-bold">
                        الطالب: {studentName}
                        </div>
                        <div className="flex justify-center mb-4">
                            <Icon name={IconComp} className={`h-24 w-24 ${colorClass}`} />
                        </div>
                        <h2 className={`text-5xl font-bold mb-4 ${colorClass}`}>{score} <span className="text-gray-400 text-2xl">/ {total}</span></h2>
                        <h3 className="text-2xl font-bold text-gray-800 mb-6">{message}</h3>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button 
                                onClick={() => setPage('home')}
                                className="bg-white text-indigo-600 border-2 border-indigo-200 py-3 rounded-xl font-bold hover:bg-indigo-50 transition flex items-center justify-center gap-2"
                            >
                                <Icon name="home" className="h-5 w-5" />
                                الرئيسية
                            </button>
                        </div>
                    </div>

                    <div className="mb-8">
                        <h3 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-2">
                            <Icon name="clipboard-list" className="h-6 w-6 text-indigo-600" />
                            تفاصيل الإجابات
                        </h3>
                        
                        <div className="space-y-6">
                            {userAnswers.map((answer, index) => (
                                <div key={index} className={`bg-white rounded-xl shadow-md overflow-hidden border-r-4 ${answer.isCorrect ? 'border-green-500' : 'border-red-500'}`}>
                                    <div className="p-6">
                                        <div className="flex items-start gap-4">
                                            <span className="bg-gray-100 text-gray-600 font-bold w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">
                                                {index + 1}
                                            </span>
                                            <div className="flex-1">
                                                <h4 className="text-lg font-bold text-gray-800 mb-4">{answer.questionText}</h4>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                                    <div className={`p-3 rounded-lg border ${answer.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                                        <span className="text-xs font-bold text-gray-500 block mb-1">إجابتك:</span>
                                                        <div className="flex items-center gap-2 font-bold">
                                                            {answer.isCorrect ? <Icon name="check-circle" className="h-5 w-5 text-green-600" /> : <Icon name="x-circle" className="h-5 w-5 text-red-600" />}
                                                            <span className={answer.isCorrect ? 'text-green-800' : 'text-red-800'}>
                                                                {answer.options[answer.selectedOption]}
                                                            </span>
                                                        </div>
                                                    </div>

                                                    {!answer.isCorrect && (
                                                        <div className="p-3 rounded-lg bg-gray-50 border border-gray-200">
                                                            <span className="text-xs font-bold text-gray-500 block mb-1">الإجابة الصحيحة:</span>
                                                            <div className="flex items-center gap-2 font-bold text-gray-800">
                                                                <Icon name="check-circle" className="h-5 w-5 text-green-600" />
                                                                {answer.options[answer.correctOption]}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="bg-blue-50 p-3 rounded-lg text-sm text-blue-800 flex items-start gap-2">
                                                    <Icon name="alert-circle" className="h-5 w-5 flex-shrink-0 mt-0.5" />
                                                    <div>
                                                        <span className="font-bold block mb-1">التفسير:</span>
                                                        {answer.rationale}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- App Component ---
        const App = () => {
            const [page, setPage] = useState('home'); 
            const [score, setScore] = useState(0);
            const [quizFinished, setQuizFinished] = useState(false);
            const [userAnswers, setUserAnswers] = useState([]);
            const [studentName, setStudentName] = useState('');

            const resetQuiz = () => {
                setScore(0);
                setUserAnswers([]);
                setQuizFinished(false);
                setPage('quiz');
            };

            // Call to initialize Lucide icons
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            return (
                <div className="min-h-screen bg-gray-50 font-sans" dir="rtl">
                    <Header setPage={setPage} studentName={studentName} />
                    
                    <main>
                        {page === 'home' && (
                            <HomePage 
                                setPage={setPage} 
                                studentName={studentName} 
                                setStudentName={setStudentName}
                            />
                        )}
                        {page === 'quiz' && (
                            <QuizPage 
                                setPage={setPage} 
                                score={score} 
                                setScore={setScore} 
                                setQuizFinished={setQuizFinished}
                                setUserAnswers={setUserAnswers}
                            />
                        )}
                        {page === 'result' && (
                            <ResultPage 
                                score={score} 
                                total={questions.length} 
                                userAnswers={userAnswers}
                                setPage={setPage} 
                                resetQuiz={resetQuiz}
                                studentName={studentName}
                            />
                        )}
                    </main>
                    
                    <footer className="bg-gray-800 text-gray-400 text-center p-6 mt-auto">
                        <p>© 2024 موقع مراجعة الدراسات الاجتماعية - الصف الثالث الإعدادي</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
